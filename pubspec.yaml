name: focus_launcher
description: "Focus — modern tarayıcıları app modunda başlatan sade bir başlatıcı."
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_custom_tabs: ^2.1.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  file_picker: ^11.0.0
  share_plus: ^10.0.2
  shared_preferences: ^2.3.2
  # Masaüstü "widget" davranışı (yalnızca Win/Mac/Linux native kodu içerir)
  window_manager: ^0.4.3
  tray_manager: ^0.3.2
  hotkey_manager: ^0.2.3
  launch_at_startup: ^0.5.1
  package_info_plus: ^8.0.0
  # Android/iOS tam ekran WebView modu
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/tray/

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: false
  web:
    generate: false
  windows:
    generate: true
  macos:
    generate: true
  background_color_android: "#0B0F14"
  adaptive_icon_background: "#0B0F14"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
