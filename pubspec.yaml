name: focus_launcher
description: "Focus — modern tarayıcıları app modunda başlatan sade bir başlatıcı."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_custom_tabs: ^2.1.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  share_plus: ^10.0.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: false
  web:
    generate: false
  windows:
    generate: true
  macos:
    generate: true
  background_color_android: "#0B0F14"
  adaptive_icon_background: "#0B0F14"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
